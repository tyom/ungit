name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Make test script executable
        run: chmod +x test_ungit.sh

      - name: Run tests
        run: ./test_ungit.sh

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and upload the asset

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create release and attach the ungit script
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            ungit \
            --title "${GITHUB_REF_NAME}" \
            --notes "Install via Homebrew: \`brew install tyom/tap/ungit\`" \
            --generate-notes

      - name: Bump Homebrew tap formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          gh api repos/tyom/homebrew-tap/dispatches \
            -f event_type=bump-formula \
            -f "client_payload[formula]=ungit" \
            -f "client_payload[version]=${GITHUB_REF_NAME#v}" \
            -f "client_payload[url]=https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/ungit" \
            -f "client_payload[sha256]=$(shasum -a 256 ungit | awk '{print $1}')"
